<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Surveillance Incendie</title>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init({
            publicKey: "8INFBsb4SSanNVXR_",  // 🔴 REMPLACEZ par votre Public Key
          });
       })();
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: white; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        h1 { color: #ff6b35; margin-bottom: 20px; }
        .logout-btn { float: right; background: #ff4757; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .sensors { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: #0f0f1a; padding: 20px; border-radius: 10px; text-align: center; }
        .card h3 { color: #ff6b35; margin-bottom: 10px; }
        .card .value { font-size: 2em; font-weight: bold; }
        .alerte { background: #ff4757; display: none; }
        .charts { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px; }
        .chart-container { background: #0f0f1a; padding: 20px; border-radius: 10px; }
        canvas { max-height: 200px; }
        #map { height: 300px; border-radius: 10px; margin-bottom: 20px; }
        .historique { background: #0f0f1a; padding: 20px; border-radius: 10px; }
        .historique table { width: 100%; border-collapse: collapse; }
        .historique th, .historique td { padding: 10px; text-align: left; border-bottom: 1px solid #333; }
        button { background: #ff6b35; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>
<div class="container">
    <button class="logout-btn" onclick="deconnexion()">Déconnexion</button>
    <h1>🚨 Système de Détection d'Incendie</h1>
    
    <div id="alerte-box" class="card alerte">
        <h3>🔥 ALERTE INCENDIE DÉTECTÉE ! 🔥</h3>
        <p>Intervention immédiate requise !</p>
    </div>
    
    <div class="sensors" id="sensors">
        <div class="card"><h3>🌡️ Température</h3><div class="value" id="temp">--</div><div>°C</div></div>
        <div class="card"><h3>💧 Humidité</h3><div class="value" id="hum">--</div><div>%</div></div>
        <div class="card"><h3>💨 Fumée</h3><div class="value" id="fumee">--</div><div>ppm</div></div>
        <div class="card"><h3>🔥 Flamme</h3><div class="value" id="flamme">--</div></div>
    </div>
    
    <div class="charts">
        <div class="chart-container"><canvas id="tempChart"></canvas></div>
        <div class="chart-container"><canvas id="humChart"></canvas></div>
        <div class="chart-container"><canvas id="fumeeChart"></canvas></div>
        <div class="chart-container"><canvas id="flammeChart"></canvas></div>
    </div>
    
    <div id="map"></div>
    
    <div style="text-align: center; margin: 20px 0;">
        <button onclick="changerNumeroWhatsApp()">📱 Changer numéro WhatsApp</button>
        <button onclick="testerWhatsApp()">📱 Tester WhatsApp</button>
    </div>
    
    <div class="historique">
        <h3>📜 Historique des alertes</h3>
        <table id="historique-table">
            <thead><tr><th>Date</th><th>Température</th><th>Fumée</th><th>Flamme</th></tr></thead>
            <tbody id="historique-body"></tbody>
        </table>
    </div>
</div>

<script>
    // Configuration Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAg_068Fe4dSjZKDvZ9UFA83v45--g9XrI",
        authDomain: "detection-fda23.firebaseapp.com",
        databaseURL: "https://detection-fda23-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "detection-fda23",
        storageBucket: "detection-fda23.firebasestorage.app",
        messagingSenderId: "987985546215",
        appId: "1:987985546215:web:31146fae602d6166294b42"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();
    
    // Vérifier authentification
    auth.onAuthStateChanged(user => {
        if (!user) window.location.href = 'index.html';
    });
    
    // Graphiques
    let tempChart, humChart, fumeeChart, flammeChart;
    const maxDataPoints = 20;
    let tempData = [], humData = [], fumeeData = [], flammeData = [], timeLabels = [];
    
    function initCharts() {
        const ctxTemp = document.getElementById('tempChart').getContext('2d');
        tempChart = new Chart(ctxTemp, { type: 'line', data: { labels: timeLabels, datasets: [{ label: 'Température (°C)', data: tempData, borderColor: '#ff6b35', fill: false }] } });
        
        const ctxHum = document.getElementById('humChart').getContext('2d');
        humChart = new Chart(ctxHum, { type: 'line', data: { labels: timeLabels, datasets: [{ label: 'Humidité (%)', data: humData, borderColor: '#4ecdc4', fill: false }] } });
        
        const ctxFumee = document.getElementById('fumeeChart').getContext('2d');
        fumeeChart = new Chart(ctxFumee, { type: 'line', data: { labels: timeLabels, datasets: [{ label: 'Fumée (ppm)', data: fumeeData, borderColor: '#95a5a6', fill: false }] } });
        
        const ctxFlamme = document.getElementById('flammeChart').getContext('2d');
        flammeChart = new Chart(ctxFlamme, { type: 'line', data: { labels: timeLabels, datasets: [{ label: 'Flamme', data: flammeData, borderColor: '#e74c3c', fill: false }] } });
    }
    
    function updateCharts(temp, hum, fumee, flamme) {
        const now = new Date().toLocaleTimeString();
        timeLabels.push(now);
        tempData.push(temp);
        humData.push(hum);
        fumeeData.push(fumee);
        flammeData.push(flamme ? 1 : 0);
        
        if (timeLabels.length > maxDataPoints) {
            timeLabels.shift(); tempData.shift(); humData.shift(); fumeeData.shift(); flammeData.shift();
        }
        
        tempChart.update(); humChart.update(); fumeeChart.update(); flammeChart.update();
    }
    
    // Carte
    let map;
    function initMap() {
        map = L.map('map').setView([36.8065, 10.1815], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        L.marker([36.8065, 10.1815]).addTo(map).bindPopup('📍 Forêt surveillée').openPopup();
    }
    
    // WhatsApp
    let numeroWhatsApp = localStorage.getItem('whatsapp_number') || '';
    
    function changerNumeroWhatsApp() {
        const newNumber = prompt('Entrez le numéro WhatsApp (ex: 216XXXXXXXX):', numeroWhatsApp);
        if (newNumber) { numeroWhatsApp = newNumber; localStorage.setItem('whatsapp_number', numeroWhatsApp); alert('Numéro enregistré !'); }
    }
    
    function testerWhatsApp() {
        if (!numeroWhatsApp) { alert('Veuillez d\'abord enregistrer un numéro'); return; }
        const message = `🧪 TEST: Système de détection d'incendie fonctionne correctement.`;
        window.open(`https://wa.me/${numeroWhatsApp}?text=${encodeURIComponent(message)}`, '_blank');
    }
    
    function envoyerAlerteWhatsApp() {
        if (!numeroWhatsApp) { alert('Veuillez enregistrer un numéro WhatsApp dans Paramètres'); return; }
        database.ref('/').once('value').then(snapshot => {
            const data = snapshot.val();
            const message = `🚨 ALERTE INCENDIE !\n\n📍 Température: ${data.temperature}°C\n💨 Fumée: ${data.fumee} ppm\n🔥 Flamme: ${data.flamme ? 'DÉTECTÉE' : 'Non'}\n💧 Humidité: ${data.humidite}%\n🕐 ${new Date().toLocaleString()}\n⚠️ Intervention immédiate requise !`;
            window.open(`https://wa.me/${numeroWhatsApp}?text=${encodeURIComponent(message)}`, '_blank');
        });
    }
    
    // 🔥 NOUVELLE FONCTION EMAIL 🔥
    async function envoyerAlerteEmail() {
        const snapshot = await database.ref('/').once('value');
        const data = snapshot.val();
        
        const isFireDetected = (data.temperature > 60 || data.fumee > 700 || data.flamme === true);
        if (!isFireDetected) return;
        
        const templateParams = {
            date: new Date().toLocaleString(),
            flamme: data.flamme ? "🔥 DÉTECTÉE" : "Aucune",
            fumee: data.fumee,
            temperature: data.temperature,
            humidite: data.humidite,
            localisation: data.localisation || "Forêt de Tunisie",
            email: "syrynmb@gmail.com"  // 🔴 REMPLACEZ par l'email du forestier
        };
        
        try {
            const response = await emailjs.send(
                'service_qgvgib4',  // 🔴 REMPLACEZ par votre Service ID
                '1kdauzg',           // Votre Template ID
                templateParams
            );
            console.log('✅ Email envoyé!', response);
        } catch (error) {
            console.error('❌ Erreur email:', error);
        }
    }
    
    function jouerSonAlerte() {
        const audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
        audio.play();
    }
    
    function verifierAlerte(data) {
        const isFireDetected = (data.temperature > 60 || data.fumee > 700 || data.flamme === true);
        const alerteBox = document.getElementById('alerte-box');
        
        if (isFireDetected) {
            alerteBox.style.display = 'block';
            jouerSonAlerte();
            envoyerAlerteWhatsApp();
            envoyerAlerteEmail();  // 🔥 AJOUT DE L'EMAIL 🔥
            
            // Sauvegarder dans historique
            database.ref('historique').push({
                date: new Date().toISOString(),
                temperature: data.temperature,
                fumee: data.fumee,
                flamme: data.flamme,
                humidite: data.humidite
            });
        } else {
            alerteBox.style.display = 'none';
        }
    }
    
    function afficherHistorique() {
        database.ref('historique').limitToLast(10).on('value', snapshot => {
            const tbody = document.getElementById('historique-body');
            tbody.innerHTML = '';
            const items = [];
            snapshot.forEach(child => { items.push({ id: child.key, ...child.val() }); });
            items.reverse().forEach(item => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = new Date(item.date).toLocaleString();
                row.insertCell(1).textContent = item.temperature + '°C';
                row.insertCell(2).textContent = item.fumee + ' ppm';
                row.insertCell(3).textContent = item.flamme ? '🔥 OUI' : '❌ NON';
            });
        });
    }
    
    function deconnexion() { auth.signOut().then(() => window.location.href = 'index.html'); }
    
    // Écouter les données Firebase
    database.ref('/').on('value', snapshot => {
        const data = snapshot.val();
        if (data) {
            document.getElementById('temp').innerHTML = data.temperature || '--';
            document.getElementById('hum').innerHTML = data.humidite || '--';
            document.getElementById('fumee').innerHTML = data.fumee || '--';
            document.getElementById('flamme').innerHTML = data.flamme ? '🔥 DÉTECTÉE' : '✅ AUCUNE';
            updateCharts(data.temperature || 0, data.humidite || 0, data.fumee || 0, data.flamme || false);
            verifierAlerte(data);
        }
    });
    
    // Initialisation
    initCharts();
    initMap();
    afficherHistorique();
    
    // Récupérer numéro WhatsApp
    if (numeroWhatsApp) console.log('WhatsApp configuré');
</script>
</body>
</html>
