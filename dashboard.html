<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Surveillance Incendie</title>
    <style>
        body {
            background: #1a1a2e;
            font-family: Arial;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .card {
            background: #0f0f1a;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            width: 150px;
            margin: 10px;
        }
        .value {
            font-size: 30px;
            font-weight: bold;
        }
        .normal { background: green; padding: 10px; border-radius: 10px; }
        .danger { background: red; padding: 10px; border-radius: 10px; }
        .attention { background: orange; padding: 10px; border-radius: 10px; }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            border-bottom: 1px solid #333;
        }
        .email-config {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: #0f0f1a;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 11px;
            color: #888;
        }
        button {
            background: #ff6b35;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { opacity: 0.8; }
        .logout-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: red;
            z-index: 999;
        }
        .test-email-btn {
            position: fixed;
            top: 60px;
            right: 10px;
            background: #27ae60;
            z-index: 999;
        }
    </style>
    <!-- Leaflet pour la carte -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Chart.js pour les graphiques -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

<script>
    // ============================================================
    // VÉRIFICATION DE CONNEXION
    // ============================================================
    if (sessionStorage.getItem('connecte') != 'oui') {
        window.location.href = 'login.html';
    }
    
    // ============================================================
    // CONFIGURATION EMAILJS
    // ============================================================
    emailjs.init({
        publicKey: "8INFBsb4SSanNVXR_"  // VOTRE PUBLIC KEY
    });
    
    const SERVICE_ID = "service_qgvgib4";   // VOTRE SERVICE ID
    const TEMPLATE_ID = "template_v7xwdjd";          // VOTRE TEMPLATE ID
    const DESTINATION_EMAIL = "syrynmb@gmail.com";  // EMAIL DU FORESTIER
    
    // ============================================================
    // AFFICHER L'EMAIL DE L'UTILISATEUR CONNECTÉ
    // ============================================================
    const userEmail = sessionStorage.getItem('userEmail');
    if (userEmail) {
        const emailDiv = document.createElement('div');
        emailDiv.style.position = 'fixed';
        emailDiv.style.bottom = '10px';
        emailDiv.style.left = '10px';
        emailDiv.style.background = '#0f0f1a';
        emailDiv.style.padding = '5px 10px';
        emailDiv.style.borderRadius = '5px';
        emailDiv.style.fontSize = '11px';
        emailDiv.style.color = '#888';
        emailDiv.innerHTML = `👤 ${userEmail}`;
        document.body.appendChild(emailDiv);
    }
    
    // ============================================================
    // FONCTION : ENVOI EMAIL D'ALERTE
    // ============================================================
    let dernierEnvoiEmail = 0;
    const DELAI_MIN_EMAIL = 60000; // 1 minute minimum entre deux emails
    
    async function envoyerEmailAlerte(temp, fumee, flamme, humidite) {
        const maintenant = Date.now();
        if (maintenant - dernierEnvoiEmail < DELAI_MIN_EMAIL) {
            console.log("⏳ Attendez 1 minute avant d'envoyer un autre email");
            return false;
        }
        
        const templateParams = {
            date: new Date().toLocaleString(),
            flamme: flamme == 1 ? "🔥 DÉTECTÉE" : "Aucune",
            fumee: fumee,
            temperature: temp,
            humidite: humidite,
            localisation: "Forêt de Tunisie - Lat: 36.8065, Long: 10.1815",
            email: DESTINATION_EMAIL
        };
        
        try {
            const response = await emailjs.send(SERVICE_ID, TEMPLATE_ID, templateParams);
            console.log('✅ Email d\'alerte envoyé!', response);
            dernierEnvoiEmail = maintenant;
            return true;
        } catch (error) {
            console.error('❌ Erreur envoi email:', error);
            return false;
        }
    }
    
    // ============================================================
    // FONCTION : TEST EMAIL
    // ============================================================
    async function testerEmail() {
        const templateParams = {
            date: new Date().toLocaleString(),
            flamme: "TEST",
            fumee: "TEST",
            temperature: "TEST",
            humidite: "TEST",
            localisation: "Test du système",
            email: DESTINATION_EMAIL
        };
        
        try {
            const response = await emailjs.send(SERVICE_ID, TEMPLATE_ID, templateParams);
            alert('✅ Email de test envoyé avec succès !');
            console.log('Email test envoyé:', response);
        } catch (error) {
            alert('❌ Erreur lors de l\'envoi du test: ' + error.text);
            console.error('Erreur:', error);
        }
    }
    
    // ============================================================
    // AFFICHAGE DES BOUTONS
    // ============================================================
    const emailConfigDiv = document.createElement('div');
    emailConfigDiv.className = 'email-config';
    emailConfigDiv.innerHTML = `📧 Alertes email vers: ${DESTINATION_EMAIL}`;
    document.body.appendChild(emailConfigDiv);
</script>

<!-- Boutons -->
<button onclick="sessionStorage.clear(); window.location.href='login.html'" class="logout-btn">
    🔓 Logout
</button>

<button onclick="testerEmail()" class="test-email-btn">
    📧 TEST EMAIL
</button>

<h1>🔥 FOREST FIRE DETECTION</h1>
<h3>Surveillance en temps réel</h3>

<!-- Cartes des capteurs -->
<div id="data">
    <div class="card">
        <h3>🌡️ Température</h3>
        <div class="value" id="temp">--</div>
        <div>°C</div>
    </div>
    <div class="card">
        <h3>💧 Humidité</h3>
        <div class="value" id="hum">--</div>
        <div>%</div>
    </div>
    <div class="card">
        <h3>💨 Fumée</h3>
        <div class="value" id="smoke">--</div>
        <div>/1023</div>
    </div>
    <div class="card">
        <h3>🔥 Flamme</h3>
        <div class="value" id="flame">--</div>
    </div>
</div>

<!-- Alerte et Pompe -->
<div id="alerte" class="normal" style="margin-top:30px;padding:15px;">🟢 NORMAL</div>
<div id="pompe" style="margin-top:20px;font-size:20px;">💧 Pompe: OFF</div>

<!-- Graphique d'évolution (4 courbes) -->
<div style="margin-top: 30px; background: #0f0f1a; padding: 15px; border-radius: 10px;">
    <h3>📈 Évolution des données (dernières 20 mesures)</h3>
    <canvas id="graphique" style="width:100%; max-height:400px;"></canvas>
</div>

<!-- Historique des alertes -->
<div style="margin-top: 30px; background: #0f0f1a; padding: 15px; border-radius: 10px;">
    <h3>📋 Historique des alertes</h3>
    <div id="historiqueListe">Chargement...</div>
</div>

<!-- Carte de localisation -->
<div style="margin-top: 30px; background: #0f0f1a; padding: 15px; border-radius: 10px;">
    <h3>🗺️ Localisation du capteur</h3>
    <div id="carte" style="height: 300px; border-radius: 10px;"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // ============================================================
    // CONFIGURATION FIREBASE
    // ============================================================
    const firebaseConfig = {
        databaseURL: "https://detection-fda23-default-rtdb.europe-west1.firebasedatabase.app/"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    // ============================================================
    // VARIABLES GLOBALES
    // ============================================================
    let alarmeJouee = false;
    let derniereAlerte = '';
    let map = null;
    
    // Variables pour le graphique (4 courbes)
    let chart = null;
    let historiqueTemp = [];
    let historiqueHumidite = [];
    let historiqueFumee = [];
    let historiqueFlamme = [];
    let historiqueLabels = [];
    
    // ============================================================
    // FONCTION : ALERTE SONORE
    // ============================================================
    function jouerSonAlerte() {
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 800;
            gainNode.gain.value = 0.5;
            
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 1);
            oscillator.stop(audioContext.currentTime + 1);
        } catch(e) {
            console.log("Son non supporté");
        }
    }
    
    // ============================================================
    // FONCTION : SAUVEGARDER ALERTE DANS HISTORIQUE
    // ============================================================
    function sauvegarderAlerte(niveau, temperature, humidite, fumee, flamme) {
        const historiqueRef = database.ref('historique');
        const newAlerteRef = historiqueRef.push();
        
        newAlerteRef.set({
            date: new Date().toISOString(),
            niveau: niveau,
            temperature: temperature,
            humidite: humidite,
            fumee: fumee,
            flamme: flamme
        });
    }
    
    // ============================================================
    // FONCTION : AFFICHER HISTORIQUE DES ALERTES
    // ============================================================
    function afficherHistorique() {
        database.ref('historique').orderByChild('date').limitToLast(10).on('value', (snapshot) => {
            const historique = snapshot.val();
            let html = '</table>';
            html += '<tr><th>Date</th><th>Niveau</th><th>Temp</th><th>Humidité</th><th>Fumée</th></tr>';
            
            if (historique) {
                Object.values(historique).reverse().forEach(alert => {
                    const date = new Date(alert.date).toLocaleString();
                    const niveau = alert.niveau === 'danger' ? '🔴 DANGER' : '🟠 ATTENTION';
                    html += `<tr>
                                <td>${date}</td>
                                <td>${niveau}</td>
                                <td>${alert.temperature}°C</td>
                                <td>${alert.humidite || '--'}%</td>
                                <td>${alert.fumee}</td>
                             </tr>`;
                });
            } else {
                html += '<tr><td colspan="5">Aucune alerte</td></tr>';
            }
            html += '</table>';
            document.getElementById('historiqueListe').innerHTML = html;
        });
    }
    
    // ============================================================
    // FONCTION : AFFICHER LA CARTE
    // ============================================================
    function afficherCarte(lat, lng) {
        if (map === null) {
            map = L.map('carte').setView([lat, lng], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);
        } else {
            map.setView([lat, lng], 13);
        }
        
        map.eachLayer((layer) => {
            if (layer instanceof L.Marker) {
                map.removeLayer(layer);
            }
        });
        
        L.marker([lat, lng]).addTo(map)
            .bindPopup('📍 Capteur incendie')
            .openPopup();
    }
    
    // ============================================================
    // FONCTIONS : GRAPHIQUE D'ÉVOLUTION
    // ============================================================
    function initialiserGraphique() {
        const ctx = document.getElementById('graphique').getContext('2d');
        
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    {
                        label: '🌡️ Température (°C)',
                        data: [],
                        borderColor: '#ff5520',
                        backgroundColor: 'rgba(255, 85, 32, 0.1)',
                        borderWidth: 2,
                        tension: 0.3,
                        fill: true,
                        pointRadius: 4,
                        pointBackgroundColor: '#ff5520',
                        pointBorderColor: 'white'
                    },
                    {
                        label: '💧 Humidité (%)',
                        data: [],
                        borderColor: '#45BAF2',
                        backgroundColor: 'rgba(69, 186, 242, 0.1)',
                        borderWidth: 2,
                        tension: 0.3,
                        fill: true,
                        pointRadius: 4,
                        pointBackgroundColor: '#45BAF2',
                        pointBorderColor: 'white'
                    },
                    {
                        label: '💨 Fumée (/1023)',
                        data: [],
                        borderColor: '#c0c0cc',
                        backgroundColor: 'rgba(192, 192, 204, 0.1)',
                        borderWidth: 2,
                        tension: 0.3,
                        fill: true,
                        pointRadius: 4,
                        pointBackgroundColor: '#c0c0cc',
                        pointBorderColor: 'white'
                    },
                    {
                        label: '🔥 Flamme (0/1)',
                        data: [],
                        borderColor: '#FFCC10',
                        backgroundColor: 'rgba(255, 204, 16, 0.1)',
                        borderWidth: 2,
                        tension: 0.3,
                        fill: true,
                        pointRadius: 4,
                        pointBackgroundColor: '#FFCC10',
                        pointBorderColor: 'white'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                animation: false,
                plugins: {
                    legend: {
                        position: 'top',
                        labels: { color: 'white', font: { size: 11 } }
                    },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        backgroundColor: '#0f0f1a',
                        titleColor: 'white',
                        bodyColor: '#ddd'
                    }
                },
                scales: {
                    x: {
                        ticks: { color: 'white', maxRotation: 45, minRotation: 45 },
                        grid: { color: '#333' },
                        title: { display: true, text: 'Heure', color: 'white' }
                    },
                    y: {
                        ticks: { color: 'white' },
                        grid: { color: '#333' },
                        title: { display: true, text: 'Valeurs', color: 'white' }
                    }
                }
            }
        });
    }
    
    function ajouterPointGraphique(temp, humidite, fumee, flamme) {
        if (!chart) return;
        
        const maintenant = new Date();
        const heure = maintenant.toLocaleTimeString();
        
        if (historiqueLabels.length >= 20) {
            historiqueLabels.shift();
            historiqueTemp.shift();
            historiqueHumidite.shift();
            historiqueFumee.shift();
            historiqueFlamme.shift();
        }
        
        historiqueLabels.push(heure);
        historiqueTemp.push(temp);
        historiqueHumidite.push(humidite);
        historiqueFumee.push(fumee);
        historiqueFlamme.push(flamme);
        
        chart.data.labels = [...historiqueLabels];
        chart.data.datasets[0].data = [...historiqueTemp];
        chart.data.datasets[1].data = [...historiqueHumidite];
        chart.data.datasets[2].data = [...historiqueFumee];
        chart.data.datasets[3].data = [...historiqueFlamme];
        chart.update('none');
    }
    
    // ============================================================
    // LECTURE DES DONNÉES FIREBASE
    // ============================================================
    database.ref().on('value', (snapshot) => {
        const data = snapshot.val();
        
        if (data) {
            const temp = data.temperature || '--';
            const hum = data.humidite || '--';
            const smoke = data.fumee || '--';
            const flame = data.flamme || '--';
            const pompe = data.pompe || 'off';
            const alerte = data.alerte || 'normal';
            
            document.getElementById('temp').innerText = temp;
            document.getElementById('hum').innerText = hum;
            document.getElementById('smoke').innerText = smoke;
            document.getElementById('flame').innerText = flame;
            
            if (temp !== '--' && smoke !== '--' && hum !== '--' && flame !== '--') {
                const tempValue = parseFloat(temp);
                const humValue = parseFloat(hum);
                const smokeValue = parseFloat(smoke);
                const flameValue = parseFloat(flame);
                
                if (!isNaN(tempValue) && !isNaN(humValue) && !isNaN(smokeValue) && !isNaN(flameValue)) {
                    ajouterPointGraphique(tempValue, humValue, smokeValue, flameValue);
                }
            }
            
            const alerteDiv = document.getElementById('alerte');
            if (alerte === 'danger') {
                alerteDiv.innerHTML = '🔴 DANGER - RISQUE INCENDIE !';
                alerteDiv.className = 'danger';
                
                if (!alarmeJouee) {
                    jouerSonAlerte();
                    alarmeJouee = true;
                    
                    // 🔥 ENVOI EMAIL AUTOMATIQUE (remplace WhatsApp)
                    console.log("📧 ENVOI ALERTE EMAIL...");
                    envoyerEmailAlerte(temp, smoke, flame, hum);
                }
                
                if (alerte !== derniereAlerte) {
                    sauvegarderAlerte(alerte, temp, hum, smoke, flame);
                    derniereAlerte = alerte;
                }
            } else if (alerte === 'attention') {
                alerteDiv.innerHTML = '🟠 ATTENTION - SURVEILLANCE';
                alerteDiv.className = 'attention';
                alarmeJouee = false;
            } else {
                alerteDiv.innerHTML = '🟢 NORMAL';
                alerteDiv.className = 'normal';
                alarmeJouee = false;
            }
            
            const pompeDiv = document.getElementById('pompe');
            if (pompe === 'on') {
                pompeDiv.innerHTML = '💧💧💧 POMPE ACTIVE - ARROSAGE ! 💧💧💧';
                pompeDiv.style.color = 'red';
            } else {
                pompeDiv.innerHTML = '💧 Pompe: OFF';
                pompeDiv.style.color = 'white';
            }
        }
    });
    
    // ============================================================
    // LOCALISATION
    // ============================================================
    database.ref('localisation').on('value', (snapshot) => {
        const loc = snapshot.val();
        if (loc && loc.latitude && loc.longitude) {
            afficherCarte(loc.latitude, loc.longitude);
        } else {
            afficherCarte(36.8, 10.18);
        }
    });
    
    // ============================================================
    // INITIALISATION
    // ============================================================
    afficherHistorique();
    initialiserGraphique();
</script>

</body>
</html>
